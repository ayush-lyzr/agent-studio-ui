server {
    listen 80;
    server_name _;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/json application/javascript;
    gzip_vary on;

    # Security Headers - Applied to all responses
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://hcaptcha.com https://*.hcaptcha.com https://client.memberstack.com https://*.userback.io https://rag.pivot-poc.accenture.com https://ads.kwanzoo.com https://www.googletagmanager.com https://lyzr-studio-dev-crawler.pivot-poc.accenture.com https://cdn-cookieyes.com https://a.usbrowserspeed.com https://*.pivot-poc.accenture.com https://cdn.plot.ly; style-src 'self' 'unsafe-inline' https://*.userback.io https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.userback.io https://api.dicebear.com; frame-src 'self' https://hcaptcha.com https://*.hcaptcha.com https://client.memberstack.com https://www.youtube.com https://ads.kwanzoo.com; connect-src 'self' https://*.hcaptcha.com https://client.memberstack.com https://*.userback.io https://api-js.mixpanel.com https://log.cookieyes.com https://cdn-cookieyes.com https://www.google-analytics.com https://a.usbrowserspeed.com https://*.pivot-poc.accenture.com wss://*.pivot-poc.accenture.com https://api.openai.com https://dev.visualwebsiteoptimizer.com https://rag.pivot-poc.accenture.com; media-src 'self' blob:; worker-src 'self' blob: 'self' blob: https://agent.pivot-poc.accenture.com https://storage.googleapis.com; object-src 'none';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Serve index.html for all non-file routes (SPA routing)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # Don't cache HTML
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
